kind = "web"
previewPath = "/"
title = "Label Check"
version = "1.0.0"
id = "artifacts/label-check"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23167

[services.development]
run = "pnpm --filter @workspace/label-check run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/label-check", "run", "build" ]
serve = "static"
publicDir = "artifacts/label-check/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23167"
BASE_PATH = "/"
